<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>X Sweets &amp; Coffee — by Traxilvania</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  /* ---------- THEME TOKENS ---------- */
  :root {
    --serif: "Cormorant Garamond", "Times New Roman", serif;
    --sans: "Inter", system-ui, -apple-system, sans-serif;

    /* Light (default) */
    --bg:          oklch(0.972 0.012 80);     /* ivory */
    --bg-elev:    oklch(0.985 0.008 80);
    --bg-soft:    oklch(0.94 0.014 78);
    --ink:        oklch(0.18 0.012 50);
    --ink-soft:   oklch(0.42 0.012 50);
    --ink-mute:   oklch(0.62 0.010 50);
    --line:       oklch(0.86 0.012 78);
    --line-soft:  oklch(0.91 0.010 78);
    --accent:     oklch(0.55 0.10 60);        /* warm bronze */
    --accent-ink: oklch(0.18 0.012 50);
    --overlay:    rgba(20, 16, 12, 0.32);
    --overlay-strong: rgba(20, 16, 12, 0.55);
    --shadow-card: 0 1px 0 rgba(20,16,12,0.04), 0 10px 30px -18px rgba(20,16,12,0.18);
  }
  :root[data-theme="dark"] {
    --bg:          oklch(0.13 0.006 60);      /* near black */
    --bg-elev:    oklch(0.17 0.008 60);
    --bg-soft:    oklch(0.22 0.008 60);       /* anthracite */
    --ink:        oklch(0.96 0.010 80);
    --ink-soft:   oklch(0.78 0.012 80);
    --ink-mute:   oklch(0.58 0.012 80);
    --line:       oklch(0.30 0.010 70);
    --line-soft:  oklch(0.24 0.008 70);
    --accent:     oklch(0.80 0.12 86);        /* gold */
    --accent-ink: oklch(0.13 0.006 60);
    --overlay:    rgba(0, 0, 0, 0.48);
    --overlay-strong: rgba(0, 0, 0, 0.68);
    --shadow-card: 0 1px 0 rgba(0,0,0,0.5), 0 18px 40px -22px rgba(0,0,0,0.7);
  }

  /* ---------- RESET / BASE ---------- */
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    font-weight: 400;
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    transition: background-color .5s ease, color .5s ease;
    overflow-x: hidden;
  }
  img { display: block; max-width: 100%; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--accent); color: var(--accent-ink); }

  /* ---------- TYPE ---------- */
  .serif { font-family: var(--serif); font-weight: 400; letter-spacing: -0.01em; }
  .display { font-family: var(--serif); font-weight: 300; letter-spacing: -0.02em; line-height: 1.02; }
  .eyebrow {
    font-family: var(--sans);
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--ink-soft);
  }
  .eyebrow .dot {
    display: inline-block; width: 4px; height: 4px; border-radius: 50%;
    background: var(--accent); vertical-align: middle; margin: 0 10px 3px 0;
  }

  /* ---------- LAYOUT ---------- */
  .wrap { width: 100%; max-width: 1240px; margin: 0 auto; padding: 0 24px; }
  @media (min-width: 768px) { .wrap { padding: 0 40px; } }
  section { position: relative; }

  /* ---------- NAV ---------- */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    transition: background-color .4s ease, border-color .4s ease, backdrop-filter .4s ease;
  }
  .nav.scrolled {
    background: color-mix(in oklab, var(--bg) 82%, transparent);
    backdrop-filter: saturate(140%) blur(14px);
    -webkit-backdrop-filter: saturate(140%) blur(14px);
    border-bottom: 1px solid var(--line-soft);
  }
  .nav-inner {
    display: flex; align-items: center; justify-content: space-between;
    height: 68px;
  }
  .brand {
    display: flex; align-items: center; gap: 12px;
    font-family: var(--serif); font-size: 20px; letter-spacing: 0.02em;
  }
  .brand-mark {
    width: 32px; height: 32px; display: grid; place-items: center;
    border: 1px solid var(--line); border-radius: 50%;
    font-family: var(--serif); font-size: 18px; font-style: italic;
    color: var(--accent);
  }
  .brand small { display: block; font-family: var(--sans); font-size: 9px; letter-spacing: 0.32em; text-transform: uppercase; color: var(--ink-mute); margin-top: 2px; }
  .brand-name { display: flex; flex-direction: column; line-height: 1; }
  .nav-links { display: none; gap: 28px; align-items: center; }
  @media (min-width: 900px) { .nav-links { display: flex; } }
  .nav-link {
    font-size: 13px; letter-spacing: 0.06em; color: var(--ink-soft);
    position: relative; padding: 6px 2px;
    transition: color .2s;
  }
  .nav-link:hover { color: var(--ink); }
  .nav-link::after {
    content: ""; position: absolute; left: 0; bottom: 0;
    width: 0; height: 1px; background: var(--accent);
    transition: width .25s ease;
  }
  .nav-link:hover::after { width: 100%; }
  .nav-actions { display: flex; align-items: center; gap: 8px; }

  /* theme toggle */
  .toggle {
    width: 40px; height: 40px; border-radius: 50%;
    display: grid; place-items: center;
    border: 1px solid var(--line);
    color: var(--ink);
    transition: background .25s, border-color .25s, transform .4s;
  }
  .toggle:hover { background: var(--bg-soft); }
  .toggle svg { width: 18px; height: 18px; transition: transform .5s ease, opacity .3s; }
  .toggle .sun { display: none; }
  .toggle .moon { display: block; }
  :root[data-theme="dark"] .toggle .sun { display: block; }
  :root[data-theme="dark"] .toggle .moon { display: none; }

  /* cart button */
  .cart-btn {
    height: 40px; padding: 0 14px; border-radius: 999px;
    display: inline-flex; align-items: center; gap: 8px;
    border: 1px solid var(--line);
    font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase;
    transition: background .25s, border-color .25s;
  }
  .cart-btn:hover { background: var(--bg-soft); }
  .cart-btn .count {
    min-width: 20px; height: 20px; border-radius: 999px; padding: 0 6px;
    background: var(--accent); color: var(--accent-ink);
    display: inline-grid; place-items: center;
    font-size: 11px; font-weight: 600; letter-spacing: 0;
  }
  .cart-btn .count.empty { display: none; }

  /* hamburger */
  .hamb {
    width: 40px; height: 40px; border-radius: 50%;
    display: grid; place-items: center; border: 1px solid var(--line);
  }
  @media (min-width: 900px) { .hamb { display: none; } }
  .hamb span {
    display: block; width: 16px; height: 1px; background: var(--ink);
    position: relative;
  }
  .hamb span::before, .hamb span::after {
    content: ""; position: absolute; left: 0; width: 16px; height: 1px; background: var(--ink);
    transition: transform .3s;
  }
  .hamb span::before { top: -5px; }
  .hamb span::after { top: 5px; }
  body.menu-open .hamb span { background: transparent; }
  body.menu-open .hamb span::before { transform: translateY(5px) rotate(45deg); }
  body.menu-open .hamb span::after { transform: translateY(-5px) rotate(-45deg); }

  /* mobile drawer */
  .drawer {
    position: fixed; inset: 0; z-index: 49;
    background: var(--bg);
    transform: translateY(-100%);
    transition: transform .5s cubic-bezier(.7,0,.2,1);
    padding: 88px 32px 40px;
    display: flex; flex-direction: column;
  }
  body.menu-open .drawer { transform: translateY(0); }
  .drawer a {
    font-family: var(--serif); font-size: 36px; letter-spacing: -0.01em;
    padding: 14px 0; border-bottom: 1px solid var(--line-soft);
    color: var(--ink); display: block;
  }
  .drawer a small { display: block; font-family: var(--sans); font-size: 10px; letter-spacing: 0.24em; color: var(--ink-mute); text-transform: uppercase; margin-top: 4px; }

  /* ---------- HERO ---------- */
  .hero {
    position: relative; min-height: 100svh;
    display: flex; align-items: flex-end;
    padding: 120px 0 64px;
    overflow: hidden;
    isolation: isolate;
  }
  .hero-bg {
    position: absolute; inset: 0; z-index: -2;
    background-size: cover; background-position: center;
    transform: scale(1.06);
    animation: heroDrift 22s ease-in-out infinite alternate;
  }
  @keyframes heroDrift {
    from { transform: scale(1.04) translate3d(0,0,0); }
    to   { transform: scale(1.10) translate3d(-1%, -1.5%, 0); }
  }
  .hero-overlay {
    position: absolute; inset: 0; z-index: -1;
    background:
      linear-gradient(180deg, var(--overlay) 0%, transparent 30%, transparent 55%, var(--overlay-strong) 100%);
    transition: background .5s ease;
  }
  :root[data-theme="light"] .hero-overlay {
    background:
      linear-gradient(180deg, rgba(255,250,240,0.15) 0%, rgba(255,250,240,0.05) 40%, rgba(40,30,20,0.55) 100%);
  }
  .hero-content { color: #fff; max-width: 920px; }
  .hero-eyebrow { color: rgba(255,255,255,0.78); }
  .hero-eyebrow .dot { background: var(--accent); }
  .hero h1 {
    font-family: var(--serif); font-weight: 300;
    font-size: clamp(48px, 9vw, 124px);
    line-height: 0.95; letter-spacing: -0.025em;
    margin: 20px 0 24px;
    color: #fff;
  }
  .hero h1 em {
    font-style: italic; font-weight: 400;
    color: var(--accent);
    display: block;
  }
  .hero p.lead {
    font-size: clamp(16px, 1.6vw, 19px);
    max-width: 540px;
    color: rgba(255,255,255,0.85);
    line-height: 1.55;
    margin: 0 0 36px;
  }
  .hero-actions { display: flex; flex-wrap: wrap; gap: 12px; }
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 16px 26px; border-radius: 999px;
    font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
    font-weight: 500;
    transition: transform .25s ease, background .25s, color .25s, border-color .25s;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn-primary {
    background: var(--accent); color: var(--accent-ink);
  }
  .btn-primary:hover { background: color-mix(in oklab, var(--accent) 88%, white 12%); }
  .btn-ghost {
    border: 1px solid rgba(255,255,255,0.5);
    color: #fff;
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.08); border-color: #fff; }
  .btn-outline {
    border: 1px solid var(--line); color: var(--ink);
  }
  .btn-outline:hover { background: var(--bg-soft); }

  .hero-meta {
    position: absolute; left: 0; right: 0; bottom: 24px;
    display: none;
  }
  @media (min-width: 900px) { .hero-meta { display: block; } }
  .hero-meta-row {
    display: flex; justify-content: space-between; align-items: end;
    color: rgba(255,255,255,0.7);
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
  }
  .scroll-cue {
    display: inline-flex; align-items: center; gap: 10px;
  }
  .scroll-cue .line { width: 48px; height: 1px; background: rgba(255,255,255,0.7); transform-origin: left; animation: cue 2s ease-in-out infinite; }
  @keyframes cue { 0%,100% { transform: scaleX(.4);} 50% { transform: scaleX(1);} }

  /* ---------- SECTIONS ---------- */
  .section { padding: 96px 0; }
  @media (min-width: 900px) { .section { padding: 140px 0; } }
  .section-header {
    display: grid; gap: 24px; margin-bottom: 64px;
  }
  @media (min-width: 900px) {
    .section-header { grid-template-columns: 1fr 1.4fr; gap: 80px; align-items: end; }
  }
  .section-title {
    font-family: var(--serif); font-weight: 300;
    font-size: clamp(36px, 5vw, 72px);
    line-height: 1; letter-spacing: -0.02em;
    margin: 14px 0 0;
  }
  .section-title em { font-style: italic; color: var(--accent); font-weight: 400; }
  .section-intro {
    font-size: 16px; color: var(--ink-soft); max-width: 520px;
    line-height: 1.6;
  }

  /* ---------- REVEAL ---------- */
  .reveal { opacity: 0; transform: translateY(28px); transition: opacity .9s ease, transform .9s cubic-bezier(.2,.7,.2,1); }
  .reveal.in { opacity: 1; transform: none; }
  .reveal[data-delay="1"] { transition-delay: .08s; }
  .reveal[data-delay="2"] { transition-delay: .16s; }
  .reveal[data-delay="3"] { transition-delay: .24s; }
  .reveal[data-delay="4"] { transition-delay: .32s; }

  /* ---------- MENU ---------- */
  .menu-tabs {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 40px;
    padding-bottom: 16px; border-bottom: 1px solid var(--line-soft);
  }
  .menu-tab {
    padding: 10px 18px; border-radius: 999px;
    font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ink-soft);
    border: 1px solid transparent;
    transition: all .25s;
  }
  .menu-tab:hover { color: var(--ink); }
  .menu-tab.active {
    color: var(--ink); border-color: var(--line);
    background: var(--bg-elev);
  }
  .menu-tab .count {
    font-size: 10px; opacity: 0.6; margin-left: 6px;
  }

  .menu-grid {
    display: grid; grid-template-columns: 1fr;
    gap: 32px 32px;
  }
  @media (min-width: 640px) { .menu-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (min-width: 1000px) { .menu-grid { grid-template-columns: repeat(3, 1fr); gap: 48px 40px; } }

  .dish {
    display: flex; flex-direction: column; gap: 16px;
    cursor: default;
  }
  .dish-img {
    aspect-ratio: 4 / 3; width: 100%;
    background: var(--bg-soft);
    overflow: hidden; position: relative;
    border: 1px solid var(--line-soft);
  }
  .dish-img .placeholder {
    position: absolute; inset: 0;
    display: grid; place-items: center;
    color: var(--ink-mute);
  }
  .dish-img svg { width: 56px; height: 56px; opacity: 0.4; }
  .dish-img::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 60%, color-mix(in oklab, var(--bg) 50%, transparent) 100%);
    opacity: 0; transition: opacity .35s;
  }
  .dish:hover .dish-img::after { opacity: 1; }
  .dish-head {
    display: flex; justify-content: space-between; align-items: baseline; gap: 16px;
  }
  .dish-name {
    font-family: var(--serif); font-size: 22px; font-weight: 400;
    line-height: 1.15; letter-spacing: -0.01em;
  }
  .dish-price {
    font-family: var(--serif); font-size: 19px; color: var(--accent);
    white-space: nowrap;
    font-feature-settings: "tnum";
  }
  .dish-sub {
    font-size: 12px; color: var(--ink-mute);
    letter-spacing: 0.04em;
  }
  .dish-add {
    align-self: flex-start; margin-top: 2px;
    padding: 8px 14px; border-radius: 999px;
    border: 1px solid var(--line);
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-soft);
    transition: all .25s;
  }
  .dish-add:hover {
    color: var(--accent-ink); background: var(--accent); border-color: var(--accent);
  }
  .dish-add.added { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }

  /* ---------- AMBIENT GALLERY ---------- */
  .ambient {
    background: var(--bg-elev);
    border-top: 1px solid var(--line-soft);
    border-bottom: 1px solid var(--line-soft);
  }
  .gallery {
    display: grid; gap: 12px; grid-template-columns: 1fr;
  }
  @media (min-width: 700px) { .gallery { grid-template-columns: 1.4fr 1fr; grid-template-rows: 1fr 1fr; gap: 16px; } }
  .gallery .g-item { position: relative; overflow: hidden; background: var(--bg-soft); }
  .gallery .g-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 1.2s ease; }
  .gallery .g-item:hover img { transform: scale(1.05); }
  .gallery .g1 { aspect-ratio: 16/10; }
  .gallery .g2 { aspect-ratio: 4/3; }
  .gallery .g3 { aspect-ratio: 4/3; }
  @media (min-width: 700px) {
    .gallery .g1 { grid-row: 1 / span 2; aspect-ratio: auto; min-height: 480px; }
    .gallery .g2, .gallery .g3 { aspect-ratio: auto; min-height: 232px; }
  }

  /* ---------- RESERVATION + ORDER side-by-side ---------- */
  .two-col {
    display: grid; gap: 24px; grid-template-columns: 1fr;
  }
  @media (min-width: 1000px) { .two-col { grid-template-columns: 1fr 1fr; gap: 32px; } }

  .panel {
    background: var(--bg-elev);
    border: 1px solid var(--line-soft);
    padding: 36px 28px;
    border-radius: 2px;
  }
  @media (min-width: 700px) { .panel { padding: 48px 44px; } }

  .panel h3 {
    font-family: var(--serif); font-weight: 400;
    font-size: 32px; letter-spacing: -0.01em;
    margin: 8px 0 8px;
  }
  .panel p.sub { color: var(--ink-soft); margin: 0 0 32px; font-size: 14px; }

  /* form */
  .form-row { display: grid; gap: 16px; grid-template-columns: 1fr; }
  @media (min-width: 600px) { .form-row.two { grid-template-columns: 1fr 1fr; } }
  .field { position: relative; }
  .field label {
    position: absolute; left: 0; top: 14px;
    font-size: 14px; color: var(--ink-mute); pointer-events: none;
    transition: all .2s ease;
    letter-spacing: 0.02em;
  }
  .field input, .field select {
    width: 100%; padding: 14px 0 10px;
    border: 0; border-bottom: 1px solid var(--line);
    background: transparent; color: var(--ink);
    font: inherit; font-size: 15px;
    outline: none;
    border-radius: 0;
    appearance: none;
    transition: border-color .25s;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field input:focus + label,
  .field input:not(:placeholder-shown) + label,
  .field select:focus + label,
  .field.filled label {
    top: -8px; font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-soft);
  }
  .field select { color: var(--ink); cursor: pointer; }
  .field .chev {
    position: absolute; right: 0; top: 14px; pointer-events: none; color: var(--ink-mute);
  }
  .form-submit { margin-top: 28px; width: 100%; justify-content: center; }
  .form-submit.btn-primary { padding: 18px 24px; }

  .confirm {
    margin-top: 16px; padding: 14px 16px;
    background: color-mix(in oklab, var(--accent) 14%, var(--bg-elev));
    border: 1px solid color-mix(in oklab, var(--accent) 50%, transparent);
    color: var(--ink);
    font-size: 13px;
    display: flex; gap: 10px; align-items: center;
  }
  .confirm svg { color: var(--accent); }

  /* ---------- CART ---------- */
  .cart-list {
    display: flex; flex-direction: column;
    border-top: 1px solid var(--line-soft);
    margin-top: 8px;
  }
  .cart-row {
    display: grid; grid-template-columns: 1fr auto auto;
    align-items: center; gap: 16px;
    padding: 16px 0; border-bottom: 1px solid var(--line-soft);
  }
  .cart-row .nm { font-family: var(--serif); font-size: 18px; line-height: 1.2; }
  .cart-row .pr { color: var(--ink-mute); font-size: 12px; margin-top: 4px; letter-spacing: 0.04em; }
  .qty {
    display: inline-flex; align-items: center; gap: 6px;
    border: 1px solid var(--line); border-radius: 999px;
    padding: 4px;
  }
  .qty button {
    width: 26px; height: 26px; border-radius: 50%; display: grid; place-items: center;
    color: var(--ink-soft); font-size: 14px; line-height: 1;
  }
  .qty button:hover { background: var(--bg-soft); color: var(--ink); }
  .qty .n { min-width: 18px; text-align: center; font-size: 13px; font-feature-settings: "tnum"; }
  .cart-row .total { font-family: var(--serif); font-size: 18px; color: var(--accent); min-width: 70px; text-align: right; font-feature-settings: "tnum"; }
  .cart-empty {
    padding: 40px 0; text-align: center; color: var(--ink-mute);
    font-size: 14px; border-top: 1px solid var(--line-soft); border-bottom: 1px solid var(--line-soft); margin-top: 8px;
  }
  .cart-empty .ic { font-size: 28px; opacity: 0.4; margin-bottom: 8px; }
  .cart-foot {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 24px; margin-top: 8px;
  }
  .cart-foot .lbl { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-mute); }
  .cart-foot .sum { font-family: var(--serif); font-size: 34px; color: var(--accent); font-feature-settings: "tnum"; }

  /* quick-add chip rail */
  .chip-rail {
    display: flex; gap: 8px; overflow-x: auto;
    padding: 0 0 8px 0;
    margin: 8px 0 20px;
    scrollbar-width: thin;
  }
  .chip-rail::-webkit-scrollbar { height: 4px; }
  .chip-rail::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
  .chip {
    flex-shrink: 0;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px; border-radius: 999px;
    border: 1px solid var(--line);
    font-size: 12px; letter-spacing: 0.06em;
    color: var(--ink-soft);
    white-space: nowrap;
    transition: all .2s;
  }
