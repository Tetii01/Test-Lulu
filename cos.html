<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Coș &amp; Checkout — X Sweets &amp; Coffee</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  /* ---------- THEME TOKENS ---------- */
  :root {
    --serif: "Cormorant Garamond", "Times New Roman", serif;
    --sans: "Inter", system-ui, -apple-system, sans-serif;

    /* Light (default) */
    --bg:          oklch(0.972 0.012 80);     /* ivory */
    --bg-elev:    oklch(0.985 0.008 80);
    --bg-soft:    oklch(0.94 0.014 78);
    --ink:        oklch(0.18 0.012 50);
    --ink-soft:   oklch(0.42 0.012 50);
    --ink-mute:   oklch(0.62 0.010 50);
    --line:       oklch(0.86 0.012 78);
    --line-soft:  oklch(0.91 0.010 78);
    --accent:     oklch(0.55 0.10 60);        /* warm bronze */
    --accent-ink: oklch(0.18 0.012 50);
    --overlay:    rgba(20, 16, 12, 0.32);
    --overlay-strong: rgba(20, 16, 12, 0.55);
    --shadow-card: 0 1px 0 rgba(20,16,12,0.04), 0 10px 30px -18px rgba(20,16,12,0.18);
  }
  :root[data-theme="dark"] {
    --bg:          oklch(0.13 0.006 60);      /* near black */
    --bg-elev:    oklch(0.17 0.008 60);
    --bg-soft:    oklch(0.22 0.008 60);       /* anthracite */
    --ink:        oklch(0.96 0.010 80);
    --ink-soft:   oklch(0.78 0.012 80);
    --ink-mute:   oklch(0.58 0.012 80);
    --line:       oklch(0.30 0.010 70);
    --line-soft:  oklch(0.24 0.008 70);
    --accent:     oklch(0.80 0.12 86);        /* gold */
    --accent-ink: oklch(0.13 0.006 60);
    --overlay:    rgba(0, 0, 0, 0.48);
    --overlay-strong: rgba(0, 0, 0, 0.68);
    --shadow-card: 0 1px 0 rgba(0,0,0,0.5), 0 18px 40px -22px rgba(0,0,0,0.7);
  }

  /* ---------- RESET / BASE ---------- */
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
  /* Backdrop visible only on wider viewports — site itself is locked to phone width */
  html {
    background: #0a0908;
    background-image:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(180, 140, 80, 0.06), transparent 70%),
      radial-gradient(ellipse 60% 50% at 50% 100%, rgba(180, 140, 80, 0.04), transparent 70%);
  }
  :root[data-theme="light"] html, html:has(:root[data-theme="light"]) { background: #1a1612; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    font-weight: 400;
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    transition: background-color .5s ease, color .5s ease;
    overflow-x: hidden;
    /* Lock the site to mobile width, centered, with backdrop on desktop */
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    box-shadow: 0 0 80px rgba(0,0,0,0.5);
  }
  img { display: block; max-width: 100%; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--accent); color: var(--accent-ink); }

  /* ---------- TYPE ---------- */
  .serif { font-family: var(--serif); font-weight: 400; letter-spacing: -0.01em; }
  .display { font-family: var(--serif); font-weight: 300; letter-spacing: -0.02em; line-height: 1.02; }
  .eyebrow {
    font-family: var(--sans);
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--ink-soft);
  }
  .eyebrow .dot {
    display: inline-block; width: 4px; height: 4px; border-radius: 50%;
    background: var(--accent); vertical-align: middle; margin: 0 10px 3px 0;
  }

  /* ---------- LAYOUT ---------- */
  .wrap { width: 100%; max-width: 480px; margin: 0 auto; padding: 0 22px; }
  section { position: relative; }

  /* ---------- NAV ---------- */
  .nav {
    position: fixed; top: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px; z-index: 50;
    transition: background-color .4s ease, border-color .4s ease, backdrop-filter .4s ease;
  }
  .nav.scrolled {
    background: color-mix(in oklab, var(--bg) 82%, transparent);
    backdrop-filter: saturate(140%) blur(14px);
    -webkit-backdrop-filter: saturate(140%) blur(14px);
    border-bottom: 1px solid var(--line-soft);
  }
  .nav-inner {
    display: flex; align-items: center; justify-content: space-between;
    height: 68px;
  }
  .brand {
    display: flex; align-items: center; gap: 9px;
    font-family: var(--serif); font-size: 15px; letter-spacing: 0.01em;
    white-space: nowrap;
    overflow: hidden;
    min-width: 0;
  }
  .brand-mark {
    width: 30px; height: 30px; flex-shrink: 0;
    display: grid; place-items: center;
    border: 1px solid var(--line); border-radius: 50%;
    font-family: var(--serif); font-size: 16px; font-style: italic;
    color: var(--accent);
  }
  .brand small { display: block; font-family: var(--sans); font-size: 8px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--ink-mute); margin-top: 1px; }
  .brand-name { display: flex; flex-direction: column; line-height: 1.05; min-width: 0; }
  .brand-name > span { font-size: 14px; }
  /* Desktop horizontal nav disabled — site is mobile-first, always uses drawer */
  .nav-links { display: none; }
  .nav-link {
    font-size: 13px; letter-spacing: 0.06em; color: var(--ink-soft);
    position: relative; padding: 6px 2px;
    transition: color .2s;
  }
  .nav-link:hover { color: var(--ink); }
  .nav-link::after {
    content: ""; position: absolute; left: 0; bottom: 0;
    width: 0; height: 1px; background: var(--accent);
    transition: width .25s ease;
  }
  .nav-link:hover::after { width: 100%; }
  .nav-actions { display: flex; align-items: center; gap: 8px; }

  /* theme toggle */
  .toggle {
    width: 40px; height: 40px; border-radius: 50%;
    display: grid; place-items: center;
    border: 1px solid var(--line);
    color: var(--ink);
    transition: background .25s, border-color .25s, transform .4s;
  }
  .toggle:hover { background: var(--bg-soft); }
  .toggle svg { width: 18px; height: 18px; transition: transform .5s ease, opacity .3s; }
  .toggle .sun { display: none; }
  .toggle .moon { display: block; }
  :root[data-theme="dark"] .toggle .sun { display: block; }
  :root[data-theme="dark"] .toggle .moon { display: none; }

  /* cart button */
  .cart-btn {
    height: 40px; min-width: 40px; padding: 0 10px; border-radius: 999px;
    display: inline-flex; align-items: center; gap: 6px;
    border: 1px solid var(--line);
    font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase;
    transition: background .25s, border-color .25s;
  }
  .cart-btn:hover { background: var(--bg-soft); }
  .cart-btn .count {
    min-width: 20px; height: 20px; border-radius: 999px; padding: 0 6px;
    background: var(--accent); color: var(--accent-ink);
    display: inline-grid; place-items: center;
    font-size: 11px; font-weight: 600; letter-spacing: 0;
  }
  .cart-btn .count.empty { display: none; }

  /* hamburger — always visible */
  .hamb {
    width: 40px; height: 40px; border-radius: 50%;
    display: grid; place-items: center; border: 1px solid var(--line);
  }
  .hamb span {
    display: block; width: 16px; height: 1px; background: var(--ink);
    position: relative;
  }
  .hamb span::before, .hamb span::after {
    content: ""; position: absolute; left: 0; width: 16px; height: 1px; background: var(--ink);
    transition: transform .3s;
  }
  .hamb span::before { top: -5px; }
  .hamb span::after { top: 5px; }
  body.menu-open .hamb span { background: transparent; }
  body.menu-open .hamb span::before { transform: translateY(5px) rotate(45deg); }
  body.menu-open .hamb span::after { transform: translateY(-5px) rotate(-45deg); }

  /* mobile drawer */
  .drawer {
    position: fixed; top: 0; bottom: 0; left: 50%; transform: translate(-50%, -100%);
    width: 100%; max-width: 480px; z-index: 49;
    background: var(--bg);
    transition: transform .5s cubic-bezier(.7,0,.2,1);
    padding: 88px 28px 40px;
    display: flex; flex-direction: column;
  }
  body.menu-open .drawer { transform: translate(-50%, 0); }
  .drawer a {
    font-family: var(--serif); font-size: 30px; letter-spacing: -0.01em;
    padding: 14px 0; border-bottom: 1px solid var(--line-soft);
    color: var(--ink); display: block;
  }
  .drawer a small { display: block; font-family: var(--sans); font-size: 10px; letter-spacing: 0.24em; color: var(--ink-mute); text-transform: uppercase; margin-top: 4px; }

  /* ---------- SECTIONS ---------- */
  .section { padding: 72px 0; }
  .section.checkout { padding-top: 24px; }

  /* ---------- REVEAL ---------- */
  .reveal { opacity: 0; transform: translateY(28px); transition: opacity .9s ease, transform .9s cubic-bezier(.2,.7,.2,1); }
  .reveal.in { opacity: 1; transform: none; }
  .reveal[data-delay="1"] { transition-delay: .08s; }
  .reveal[data-delay="2"] { transition-delay: .16s; }
  .reveal[data-delay="3"] { transition-delay: .24s; }
  .reveal[data-delay="4"] { transition-delay: .32s; }

  /* ---------- PANEL ---------- */
  .panel {
    background: var(--bg-elev);
    border: 1px solid var(--line-soft);
    padding: 28px 22px;
    border-radius: 4px;
  }
  .panel h3 {
    font-family: var(--serif); font-weight: 400;
    font-size: 28px; letter-spacing: -0.01em;
    margin: 8px 0 6px;
  }
  .panel p.sub { color: var(--ink-soft); margin: 0 0 26px; font-size: 13.5px; line-height: 1.5; }
  .panel-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 20px;
  }
  .panel-head h3 { margin: 0; }
  .panel-count {
    font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink-mute);
  }

  /* serving mode toggle */
  .mode-toggle {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; margin-bottom: 28px;
  }
  .mode-opt {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 14px; text-align: left;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: var(--bg);
    transition: all .25s;
    color: var(--ink-soft);
  }
  .mode-opt span { display: flex; flex-direction: column; line-height: 1.1; }
  .mode-opt strong { font-size: 13px; font-weight: 500; color: var(--ink); letter-spacing: 0.01em; }
  .mode-opt small { font-size: 10.5px; color: var(--ink-mute); margin-top: 3px; letter-spacing: 0.04em; }
  .mode-opt:hover { border-color: var(--ink-soft); }
  .mode-opt.active {
    border-color: var(--accent);
    background: color-mix(in oklab, var(--accent) 10%, var(--bg));
    color: var(--ink);
  }
  .mode-opt.active strong { color: var(--accent); }

  /* checkout summary */
  .cart-summary {
    margin: 28px 0 20px;
    padding: 18px 16px;
    background: var(--bg);
    border: 1px solid var(--line-soft);
    border-radius: 4px;
  }
  .sum-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 6px 0;
    font-size: 14px; color: var(--ink-soft);
  }
  .sum-row .v { font-family: var(--serif); font-size: 17px; color: var(--ink); font-feature-settings: "tnum"; }
  .sum-row.total-row {
    border-top: 1px solid var(--line-soft);
    margin-top: 8px; padding-top: 14px;
    font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-mute);
  }
  .sum-row.total-row .v.big {
    font-size: 30px; color: var(--accent); line-height: 1;
  }
  .sum-row.total-row .v.big small { font-size: 14px; color: var(--ink-mute); letter-spacing: 0.1em; margin-left: 4px; }

  .checkout-actions {
    display: flex; gap: 10px; align-items: stretch;
  }
  .checkout-actions .btn { padding: 14px 18px; }
  .checkout-actions .btn-outline { padding: 14px 16px; font-size: 10.5px; }

  /* form */
  .form-row { display: grid; gap: 18px; grid-template-columns: 1fr; }
  .form-row.two { grid-template-columns: 1fr 1fr; }
  .field { position: relative; }
  .field label {
    position: absolute; left: 0; top: 14px;
    font-size: 14px; color: var(--ink-mute); pointer-events: none;
    transition: all .2s ease;
    letter-spacing: 0.02em;
  }
  .field input, .field select {
    width: 100%; padding: 14px 0 10px;
    border: 0; border-bottom: 1px solid var(--line);
    background: transparent; color: var(--ink);
    font: inherit; font-size: 15px;
    outline: none;
    border-radius: 0;
    appearance: none;
    transition: border-color .25s;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field input:focus + label,
  .field input:not(:placeholder-shown) + label,
  .field select:focus + label,
  .field.filled label {
    top: -8px; font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-soft);
  }
  .field select { color: var(--ink); cursor: pointer; }
  .field .chev {
    position: absolute; right: 0; top: 14px; pointer-events: none; color: var(--ink-mute);
  }

  .confirm {
    margin-top: 16px; padding: 14px 16px;
    background: color-mix(in oklab, var(--accent) 14%, var(--bg-elev));
    border: 1px solid color-mix(in oklab, var(--accent) 50%, transparent);
    color: var(--ink);
    font-size: 13px;
    display: flex; gap: 10px; align-items: center;
  }
  .confirm svg { color: var(--accent); }

  /* ---------- CART ---------- */
  .cart-list {
    display: flex; flex-direction: column;
    border-top: 1px solid var(--line-soft);
    margin-top: 8px;
  }
  .cart-row {
    display: grid; grid-template-columns: 1fr auto;
    grid-template-areas: "info qty" "info total";
    align-items: center; column-gap: 12px; row-gap: 4px;
    padding: 14px 0; border-bottom: 1px solid var(--line-soft);
  }
  .cart-row-info { grid-area: info; min-width: 0; }
  .cart-row .qty { grid-area: qty; justify-self: end; }
  .cart-row .total { grid-area: total; justify-self: end; }
  .cart-row .nm { font-family: var(--serif); font-size: 17px; line-height: 1.2; }
  .cart-row .pr { color: var(--ink-mute); font-size: 11.5px; margin-top: 3px; letter-spacing: 0.04em; }
  .qty {
    display: inline-flex; align-items: center; gap: 4px;
    border: 1px solid var(--line); border-radius: 999px;
    padding: 3px;
  }
  .qty button {
    width: 24px; height: 24px; border-radius: 50%; display: grid; place-items: center;
    color: var(--ink-soft); font-size: 14px; line-height: 1;
  }
  .qty button:hover { background: var(--bg-soft); color: var(--ink); }
  .qty .n { min-width: 18px; text-align: center; font-size: 12.5px; font-feature-settings: "tnum"; }
  .cart-row .total { font-family: var(--serif); font-size: 16px; color: var(--accent); font-feature-settings: "tnum"; }
  .cart-row .total small { font-size: 10px; color: var(--ink-mute); letter-spacing: 0.1em; margin-left: 3px; }
  .cart-empty {
    padding: 40px 0; text-align: center; color: var(--ink-mute);
    font-size: 14px; border-top: 1px solid var(--line-soft); border-bottom: 1px solid var(--line-soft); margin-top: 8px;
  }
  .cart-empty .ic { font-size: 28px; opacity: 0.4; margin-bottom: 8px; }

  /* quick-add chip rail */
  .chip-rail {
    display: flex; gap: 8px; overflow-x: auto;
    padding: 0 0 8px 0;
    margin: 8px 0 20px;
    scrollbar-width: thin;
  }
  .chip-rail::-webkit-scrollbar { height: 4px; }
  .chip-rail::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
  .chip {
    flex-shrink: 0;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px; border-radius: 999px;
    border: 1px solid var(--line);
    font-size: 12px; letter-spacing: 0.06em;
    color: var(--ink-soft);
    white-space: nowrap;
    transition: all .2s;
  }
  .chip:hover { color: var(--ink); border-color: var(--ink-soft); }
  .chip .pl { color: var(--accent); font-weight: 600; font-size: 14px; line-height: 1; }
  .chip .pr { font-size: 11px; opacity: 0.6; margin-left: 2px; }

  /* ---------- BUTTONS ---------- */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    padding: 16px 24px; border-radius: 999px;
    font-size: 11.5px; letter-spacing: 0.16em; text-transform: uppercase;
    font-weight: 500;
    transition: transform .25s ease, background .25s, color .25s, border-color .25s;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn-primary { background: var(--accent); color: var(--accent-ink); }
  .btn-primary:hover { background: color-mix(in oklab, var(--accent) 88%, white 12%); }
  .btn-outline { border: 1px solid var(--line); color: var(--ink); }
  .btn-outline:hover { background: var(--bg-soft); }

  /* ---------- FOOTER ---------- */
  footer.foot {
    background: var(--bg-elev);
    border-top: 1px solid var(--line-soft);
    padding: 56px 0 28px;
  }
  .foot-grid {
    display: flex; flex-direction: column; gap: 32px;
  }
  .foot h4 { font-family: var(--sans); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-mute); font-weight: 500; margin: 0 0 16px; }
  .foot ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
  .foot a { color: var(--ink-soft); font-size: 14px; transition: color .2s; }
  .foot a:hover { color: var(--accent); }
  .foot .brand-block .display { font-size: 26px; line-height: 1.05; margin: 0 0 14px; }
  .foot .brand-block p { color: var(--ink-soft); font-size: 14px; max-width: 320px; margin: 0; line-height: 1.6; }
  .foot-bar {
    margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--line-soft);
    display: flex; flex-direction: column; gap: 6px;
    font-size: 11px; color: var(--ink-mute);
    letter-spacing: 0.04em;
  }

  /* ---------- PAGE HEADER ---------- */
  .page-header {
    position: relative;
    padding: 110px 0 24px;
    background: var(--bg);
    border-bottom: 1px solid var(--line-soft);
  }
  .back-link {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-soft);
    padding: 8px 0;
    transition: color .2s, gap .2s;
  }
  .back-link:hover { color: var(--accent); gap: 12px; }
  .page-title {
    font-family: var(--serif); font-weight: 300;
    font-size: 52px; line-height: 1; letter-spacing: -0.02em;
    margin: 12px 0 18px;
    color: var(--ink);
  }
  .page-title em { font-style: italic; color: var(--accent); font-weight: 400; }
  .page-lead {
    font-size: 14.5px; color: var(--ink-soft);
    line-height: 1.6;
    margin: 0 0 8px;
    max-width: 100%;
  }

  /* ---------- MISC ---------- */
  .eyebrow {
    font-family: var(--sans);
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--ink-soft);
  }
  .eyebrow .dot {
    display: inline-block; width: 4px; height: 4px; border-radius: 50%;
    background: var(--accent); vertical-align: middle; margin: 0 10px 3px 0;
  }
  .pill-static {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px; border-radius: 999px;
    background: var(--bg-elev); border: 1px solid var(--line-soft);
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-soft);
  }
  .pill-static .dot { width: 6px; height: 6px; border-radius: 50%; background: oklch(0.7 0.18 145); display: inline-block; }
  .display { font-family: var(--serif); font-weight: 300; letter-spacing: -0.02em; line-height: 1.02; }

  /* avoid layout flicker before React hydrates */
  #root:empty::before {
    content: ""; display: block; min-height: 100vh; background: var(--bg);
  }

  /* nav offset for hash navigation between pages */
  html { scroll-padding-top: 88px; }
</style>
</head>
<body>
  <div id="root"></div>

  <!-- React 18 -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
